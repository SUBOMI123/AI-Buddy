name = "ai-buddy-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# API keys are stored as Wrangler secrets, never in source code.
# Set secrets via:
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put ASSEMBLYAI_API_KEY
#   npx wrangler secret put ELEVENLABS_API_KEY
#   npx wrangler secret put APP_HMAC_SECRET

# ============================================================
# PRODUCTION REQUIRED — Replace placeholder before first deploy
# ============================================================
# KV namespace for per-token rate limiting (D-10).
# Steps:
#   1. npx wrangler kv namespace create RATE_LIMIT
#      (outputs a namespace ID, e.g. "abc123def456...")
#   2. Replace the id below with the actual ID from step 1
#   3. Commit wrangler.toml with the real ID (it is not a secret)
# For local dev, `wrangler dev` creates a local KV automatically — no ID needed.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE-WITH-OUTPUT-OF: npx wrangler kv namespace create RATE_LIMIT"
