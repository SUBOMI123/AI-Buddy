name = "ai-buddy-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# API keys are stored as Wrangler secrets, never in source code.
# Set secrets via:
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put ASSEMBLYAI_API_KEY
#   npx wrangler secret put ELEVENLABS_API_KEY
#   npx wrangler secret put APP_HMAC_SECRET

# KV namespace for per-token rate limiting (D-10).
# Create the namespace before first deploy:
#   npx wrangler kv namespace create RATE_LIMIT
# Then replace the placeholder ID below with the actual ID.
# For local dev, `wrangler dev` creates a local KV automatically.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder-create-via-wrangler"
